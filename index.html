const CAT_ORDER=["M","E","H","C","D","I","J","S","R","F","G","P","U","L","W","X"];
const CATS={M:"Mini",E:"Economy",H:"Economy Elite",C:"Compact",D:"Compact Elite",I:"Intermediate",J:"Intermediate Elite",S:"Standard",R:"Standard Elite",F:"Fullsize",G:"Fullsize Elite",P:"Premium",U:"Premium Elite",L:"Luxury",W:"Luxury Elite",X:"Exklusiv"};
const BODIES={B:"2-türig",D:"4-türig",L:"Gran Coupé",W:"Kombi",F:"SUV",T:"Cabriolet",E:"Coupé",V:"Transporter",Z:"Glücksauto"};
const TRANS={M:"Schalt",A:"Automatik",D:"Allrad",L:"Luxus",S:"Spezial"};
const FAMILY={B:"PKW",D:"PKW",L:"PKW",W:"Kombi",F:"SUV",T:"Cabrio",E:"Coupé",V:"Transporter",Z:"Sonstige"};
const STATUS={"0":{label:"Verfügbar",color:"#16a34a",bg:"#dcfce7",icon:"✅"},"3":{label:"Reserviert",color:"#d97706",bg:"#fef3c7",icon:"🔒"},"4":{label:"Aufbereitung",color:"#2563eb",bg:"#dbeafe",icon:"⏳"},"5":{label:"Kaputt",color:"#dc2626",bg:"#fee2e2",icon:"🔧"},"6":{label:"Kaputt",color:"#dc2626",bg:"#fee2e2",icon:"🔧"}};

function parseA(c){
  if(!c||c.length<4)return null;
  c=c.toUpperCase();
  return{raw:c,cat:c[0],body:c[1],trans:c[2],catLabel:CATS[c[0]]||c[0],bodyLabel:BODIES[c[1]]||c[1],transLabel:TRANS[c[2]]||c[2],family:FAMILY[c[1]]||"?",catIdx:CAT_ORDER.indexOf(c[0]),isAuto:c[2]==="A"||c[2]==="D"};
}

function score(b,a,lor){
  const bp=parseA(b),ap=parseA(a);
  if(!bp||!ap)return -999;
  if(bp.isAuto&&!ap.isAuto)return -999;
  if(ap.catIdx<bp.catIdx)return -999;
  // Verbrenner-Kunde bekommt kein Elektro
  // Verbrenner/Diesel/Hybrid-Kunde bekommt kein Elektro (E, C, O)
  if((bp.fuel==="R"||bp.fuel==="D"||bp.fuel==="H")&&(ap.fuel==="E"||ap.fuel==="C"||ap.fuel==="O"))return -999;
  // Hochklassige Cabrios (über C-Klasse) nur an Cabrio-Buchungen
  if(ap.body==="T"&&ap.catIdx>3&&bp.body!=="T")return -999;
  
  var days=parseInt(lor)||1;
  var steps=ap.catIdx-bp.catIdx;
  
  // Lange Mieten (8+ Tage): max 1 Stufe Upgrade erlaubt
  if(days>=8&&steps>1)return -999;
  
  // Strafe pro Stufe je nach LOR
  var penalty;
  if(days<=2)      penalty=10;  // Tagesmiete: tolerant
  else if(days<=7) penalty=20;  // Mittellang: moderat
  else             penalty=40;  // Lange Miete: sehr streng
  
  let s=0;
  if(ap.raw===bp.raw)s+=100;
  if(ap.family===bp.family)s+=50;
  if(ap.cat===bp.cat)s+=30;
  if(!bp.isAuto&&!ap.isAuto)s+=70; // Manual→Manual stark bevorzugt
  if(!bp.isAuto&&ap.isAuto)s+=5;
  if(bp.isAuto&&ap.isAuto)s+=20;
  s-=steps*penalty;
  return s;
}

function autoMatch(drops,resis){
  const pool=drops;
  const used=new Set();
  // Pre-assign overrides
  Object.values(state.overrides).forEach(function(did){used.add(did);});
  return resis.map(r=>{
    // Manual override?
    if(state.overrides[r.id]){
      const overrideDrop=drops.find(d=>d.id===state.overrides[r.id]);
      if(overrideDrop){
        const type=parseA(r.acriss)?.raw===parseA(overrideDrop.acriss)?.raw?"exact":"upgrade";
        return{r,d:overrideDrop,type,manual:true};
      }
    }
    const cands=pool.filter(d=>!used.has(d.id)).map(d=>({d,s:score(r.acriss,d.acriss,r.lor)})).filter(x=>x.s>-999).sort((a,b)=>b.s-a.s);
    if(!cands.length)return{r,d:null,type:"none"};
    used.add(cands[0].d.id);
    const type=parseA(r.acriss)?.raw===parseA(cands[0].d.acriss)?.raw?"exact":"upgrade";
    return{r,d:cands[0].d,type};
  });
}

var toastTimer=null;
function showToast(msg,dur){
  dur=dur||2500;
  state.toast=msg;
  render();
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){state.toast="";render();},dur);
}

async function scanPhoto(file){
  if(!state.apiKey){showToast("⚠️ Erst API Key im Key-Tab eingeben!");return;}
  state.scanning=true;render();
  showToast("📸 Foto wird gelesen...",8000);
  try{
    var base64=await new Promise(function(res,rej){
      var r=new FileReader();
      r.onload=function(){res(r.result.split(",")[1]);};
      r.onerror=rej;
      r.readAsDataURL(file);
    });
    showToast("🤖 KI analysiert...",8000);
    var prompt='Analysiere diesen Sixt Lynx Fleet Monitor Screenshot.\nErkenne ob es Drops (Rückgaben) oder Reservations ist.\nGib NUR JSON zurück:\nFür DROPS: {"type":"drops","data":[{"time":"08:00","plate":"M-XX 1234","acriss":"CDAR","vehicle":"VW Golf","lor":"3","status":"0"}]}\nFür RESERVATIONS: {"type":"resis","data":[{"time":"06:00","resi":"9734xxxxxx","acriss":"CDAR","returnDate":"10.06.","lor":"3"}]}\nNur JSON, kein Text!';
    var res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+state.apiKey,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:[{inlineData:{mimeType:file.type||"image/jpeg",data:base64}},{text:prompt}]}]})
    });
    var data=await res.json();
    if(!res.ok)throw new Error((data.error&&data.error.message)||"API Fehler "+res.status);
    if(!data.candidates||!data.candidates[0])throw new Error("Keine KI Antwort");
    var text=data.candidates[0].content.parts[0].text.replace(/```json|```/g,"").trim();
    var parsed=JSON.parse(text);
    state.scanning=false;
    if(parsed.type==="drops"&&parsed.data&&parsed.data.length){
      parsed.data.forEach(function(d){state.drops.push(Object.assign({},d,{id:Date.now()+Math.random()}));});
      state.tab="drops";
      showToast("✅ "+parsed.data.length+" Drops importiert!");
    }else if(parsed.type==="resis"&&parsed.data&&parsed.data.length){
      parsed.data.forEach(function(d){state.resis.push(Object.assign({},d,{id:Date.now()+Math.random()}));});
      state.tab="resis";
      showToast("✅ "+parsed.data.length+" Reservierungen importiert!");
    }else{
      showToast("⚠️ Keine Daten erkannt – nochmal versuchen");
    }
    render();
  }catch(e){
    state.scanning=false;
    showToast("❌ Fehler: "+e.message,5000);
    render();
  }
}

function h(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs){
    Object.keys(attrs).forEach(function(k){
      if(k==="style"){Object.assign(el.style,attrs[k]);}
      else if(k==="class"){el.className=attrs[k];}
      else if(k==="html"){el.innerHTML=attrs[k];}
      else if(typeof attrs[k]==="function"){el.addEventListener(k.replace(/^on/,"").toLowerCase(),attrs[k]);}
      else{el.setAttribute(k,attrs[k]);}
    });
  }
  if(children){
    if(!Array.isArray(children))children=[children];
    children.forEach(function(c){
      if(c==null||c===false||c===undefined)return;
      if(typeof c==="string"||typeof c==="number"){el.appendChild(document.createTextNode(String(c)));}
      else if(c.nodeType){el.appendChild(c);}
    });
  }
  return el;
}

function t(text){return document.createTextNode(String(text||""));}

function renderScanButtons(){
  var wrap=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"16px"}});
  if(state.scanning){
    var spinner=h("div",{style:{gridColumn:"span 2",background:"linear-gradient(135deg,#7c3aed,#4f46e5)",borderRadius:"10px",padding:"13px",display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",color:"#fff",fontWeight:"700"}});
    spinner.innerHTML='<div style="width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite"></div> KI analysiert...';
    wrap.appendChild(spinner);
  }else{
    var lbl1=document.createElement("label");
    lbl1.className="scan-label";
    lbl1.style.background="linear-gradient(135deg,#7c3aed,#4f46e5)";
    lbl1.innerHTML='<span style="font-size:18px">📸</span><span>Kamera</span>';
    var inp1=document.createElement("input");
    inp1.type="file";inp1.accept="image/*";inp1.setAttribute("capture","environment");
    inp1.addEventListener("change",function(){if(this.files&&this.files[0])scanPhoto(this.files[0]);});
    lbl1.appendChild(inp1);
    wrap.appendChild(lbl1);

    var lbl2=document.createElement("label");
    lbl2.className="scan-label";
    lbl2.style.background="linear-gradient(135deg,#0d9488,#0f766e)";
    lbl2.innerHTML='<span style="font-size:18px">🖼️</span><span>Galerie</span>';
    var inp2=document.createElement("input");
    inp2.type="file";inp2.accept="image/*";
    inp2.addEventListener("change",function(){if(this.files&&this.files[0])scanPhoto(this.files[0]);});
    lbl2.appendChild(inp2);
    wrap.appendChild(lbl2);
  }
  if(!state.apiKey){
    wrap.appendChild(h("div",{style:{gridColumn:"span 2",fontSize:"11px",color:"#f87171",textAlign:"center",marginTop:"4px"}},"⚠️ API Key fehlt → Tab Key öffnen"));
  }
  return wrap;
}

function renderPlan(){
  var matches=autoMatch(state.drops,state.resis);
  var exact=matches.filter(function(m){return m.type==="exact";}).length;
  var upgrade=matches.filter(function(m){return m.type==="upgrade";}).length;
  var none=matches.filter(function(m){return m.type==="none";}).length;
  var wrap=document.createDocumentFragment();
  wrap.appendChild(renderScanButtons());

  // KPIs
  var kpis=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px",marginBottom:"16px"}});
  [{l:"Total",v:matches.length,c:"#818cf8",i:"📊"},{l:"Exakt",v:exact,c:"#4ade80",i:"✅"},{l:"Upgrade",v:upgrade,c:"#facc15",i:"⬆️"},{l:"Fehlt",v:none,c:"#f87171",i:"🚨"}].forEach(function(k){
    var kd=h("div",{style:{background:"#131325",border:"1px solid "+k.c+"33",borderRadius:"10px",padding:"10px 4px",textAlign:"center"}});
    kd.appendChild(h("div",{style:{fontSize:"14px"}},k.i));
    kd.appendChild(h("div",{style:{fontSize:"20px",fontWeight:"700",color:k.c,fontFamily:"monospace"}},k.v));
    kd.appendChild(h("div",{style:{fontSize:"9px",color:"#666",textTransform:"uppercase"}},k.l));
    kpis.appendChild(kd);
  });
  wrap.appendChild(kpis);

  matches.forEach(function(m){
    var ba=parseA(m.r.acriss),da=m.d?parseA(m.d.acriss):null;
    var sc=m.type==="exact"?{lbl:"✅ Exakt",bg:"#dcfce7",bdr:"#16a34a",txt:"#15803d"}:m.type==="upgrade"?{lbl:"⬆️ Upgrade",bg:"#fef9c3",bdr:"#ca8a04",txt:"#78350f"}:{lbl:"🚨 Kein Auto",bg:"#fee2e2",bdr:"#dc2626",txt:"#991b1b"};
    var card=h("div",{class:"card",style:{borderLeft:"3px solid "+sc.bdr,marginBottom:"10px"}});
    var top=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}});
    top.appendChild(h("div",{style:{background:"#0d0d1a",borderRadius:"7px",padding:"5px 9px",fontFamily:"monospace",fontSize:"14px",fontWeight:"700",color:O}},m.r.time));
    top.appendChild(h("div",{style:{flex:"1",fontSize:"10px",color:"#666",fontFamily:"monospace"}},m.r.resi||""));
    var badge=h("span",{style:{background:sc.bg,color:sc.txt,border:"1px solid "+sc.bdr,borderRadius:"20px",padding:"3px 8px",fontSize:"10px",fontWeight:"700"}},sc.lbl);
    top.appendChild(badge);
    card.appendChild(top);

    var grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 20px 1fr",gap:"6px",alignItems:"center"}});
    var left=h("div",{style:{background:"#0d0d1a",borderRadius:"8px",padding:"10px"}});
    left.appendChild(h("div",{style:{fontSize:"9px",color:"#555",textTransform:"uppercase",marginBottom:"3px"}},"Gebucht"));
    left.appendChild(h("div",{style:{fontFamily:"monospace",fontSize:"17px",fontWeight:"700",color:"#818cf8"}},m.r.acriss));
    left.appendChild(h("div",{style:{fontSize:"10px",color:"#888"}},ba?ba.catLabel:"–"));
    left.appendChild(h("div",{style:{fontSize:"9px",color:"#666"}},ba?ba.bodyLabel+" · "+ba.transLabel:"–"));
    grid.appendChild(left);
    grid.appendChild(h("div",{style:{textAlign:"center",color:"#333",fontSize:"16px"}},"→"));
    var right=h("div",{style:{background:"#0d0d1a",borderRadius:"8px",padding:"10px"}});
    right.appendChild(h("div",{style:{fontSize:"9px",color:"#555",textTransform:"uppercase",marginBottom:"3px"}},"Zugeteilt"));
    if(m.d){
      right.appendChild(h("div",{style:{fontFamily:"monospace",fontSize:"17px",fontWeight:"700",color:"#fff"}},m.d.acriss));
      right.appendChild(h("div",{style:{fontSize:"10px",color:"#ccc"}},m.d.vehicle));
      right.appendChild(h("div",{style:{fontSize:"9px",color:"#666",fontFamily:"monospace"}},m.d.plate));
    }else{
      right.appendChild(h("div",{style:{color:"#f87171",fontWeight:"700",fontSize:"12px",paddingTop:"4px"}},"Kein Auto!"));
    }
    grid.appendChild(right);
    card.appendChild(grid);
    if(m.d&&ba&&da&&!ba.isAuto&&!da.isAuto)card.appendChild(h("div",{style:{marginTop:"8px",fontSize:"11px",color:"#4ade80",background:"#052e16",borderRadius:"6px",padding:"4px 8px",display:"inline-block"}},"✅ Manual → Manual"));
    if(m.d&&ba&&da&&!ba.isAuto&&da.isAuto)card.appendChild(h("div",{style:{marginTop:"8px",fontSize:"11px",color:"#60a5fa",background:"#0c1a2e",borderRadius:"6px",padding:"4px 8px",display:"inline-block"}},"⬆️ Manual → Auto Fallback"));
    if(m.type==="none")card.appendChild(h("div",{style:{marginTop:"8px",fontSize:"11px",color:"#fca5a5",background:"#450a0a",borderRadius:"6px",padding:"5px 8px"}},"🚨 Nachbarstation kontaktieren!"));
    card.appendChild(h("div",{style:{marginTop:"8px",fontSize:"10px",color:"#555"}},"LOR "+m.r.lor+"T · bis "+(m.r.returnDate||"–")));
    // Change button
    var footer=h("div",{style:{marginTop:"10px",display:"flex",gap:"8px",alignItems:"center"}});
    if(m.manual){
      footer.appendChild(h("span",{style:{fontSize:"10px",color:"#f59e0b",background:"#451a03",borderRadius:"6px",padding:"3px 8px"}},"✏️ Manuell geändert"));
    }
    var changeBtn=h("button",{style:{background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:"7px",padding:"5px 12px",fontSize:"11px",cursor:"pointer",marginLeft:"auto"}},m.d?"✏️ Ändern":"➕ Zuteilen");
    (function(match){
      changeBtn.addEventListener("click",function(){
        state.changeModal={resiId:match.r.id,resi:match.r};
        render();
      });
    })(m);
    footer.appendChild(changeBtn);
    card.appendChild(footer);
    wrap.appendChild(card);
  });

  var rules=h("div",{style:{background:"#1a0a00",border:"1px solid #FF660044",borderRadius:"12px",padding:"12px"}});
  rules.appendChild(h("div",{style:{fontWeight:"700",color:O,marginBottom:"8px",fontSize:"12px"}},"🚨 Regeln"));
  ["Manual + Manual → Manual geben ✅","Manual + kein Manual → Auto Fallback ⬆️","Automatik → NUR Automatik ❌","Kein Downgrade ❌","Status 3 = nicht anfassen 🔒","Status 4 = Aufbereitung ⏳","Status 5/6 = kaputt 🔧"].forEach(function(r){
    rules.appendChild(h("div",{style:{fontSize:"11px",color:"#ccc",padding:"3px 0",borderBottom:"1px solid #2a1500"}},r));
  });
  wrap.appendChild(rules);
  return wrap;
}

function renderDrops(){
  var wrap=document.createDocumentFragment();
  wrap.appendChild(renderScanButtons());
  var nd=state.nd;
  var form=h("div",{class:"card",style:{border:"1px solid #2a2a45"}});
  form.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"700",color:O,marginBottom:"10px"}},"+ Drop manuell hinzufügen"));
  var grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}});

  function inp(lbl,type,placeholder,val,onchange){
    var d=h("div",{});
    d.appendChild(h("div",{style:{fontSize:"10px",color:"#888",marginBottom:"4px",textTransform:"uppercase"}},lbl));
    var i=h("input",{class:"inp",type:type,placeholder:placeholder,value:val||""});
    i.addEventListener("input",onchange);
    d.appendChild(i);return d;
  }

  grid.appendChild(inp("Uhrzeit","time","",nd.time,function(e){state.nd.time=e.target.value;}));
  grid.appendChild(inp("Kennzeichen","text","M-XX 1234",nd.plate,function(e){state.nd.plate=e.target.value.toUpperCase();}));

  var acDiv=h("div",{});
  acDiv.appendChild(h("div",{style:{fontSize:"10px",color:"#888",marginBottom:"4px",textTransform:"uppercase"}},"ACRISS"));
  var acInp=h("input",{class:"inp",placeholder:"CDAR",maxlength:"4",value:nd.acriss||"",style:{textTransform:"uppercase",fontFamily:"monospace",letterSpacing:"2px",color:nd.acriss&&nd.acriss.length===4?"#4ade80":"#fff"}});
  acInp.addEventListener("input",function(e){state.nd.acriss=e.target.value.toUpperCase().slice(0,4);render();});
  acDiv.appendChild(acInp);
  if(nd.acriss&&nd.acriss.length===4){var p=parseA(nd.acriss);if(p)acDiv.appendChild(h("div",{style:{fontSize:"9px",color:"#4ade80",marginTop:"2px"}},p.catLabel+" · "+p.bodyLabel+" · "+p.transLabel));}
  grid.appendChild(acDiv);

  grid.appendChild(inp("Fahrzeug","text","VW Golf",nd.vehicle,function(e){state.nd.vehicle=e.target.value;}));
  grid.appendChild(inp("LOR","number","3",nd.lor,function(e){state.nd.lor=e.target.value;}));

  var stDiv=h("div",{});
  stDiv.appendChild(h("div",{style:{fontSize:"10px",color:"#888",marginBottom:"4px",textTransform:"uppercase"}},"Status"));
  var sel=h("select",{class:"inp"});
  [["0","0 – Verfügbar"],["3","3 – Reserviert"],["4","4 – Aufbereitung"],["5","5 – Kaputt"]].forEach(function(o){
    var opt=h("option",{value:o[0]},o[1]);
    if(nd.status===o[0])opt.setAttribute("selected","selected");
    sel.appendChild(opt);
  });
  sel.addEventListener("change",function(e){state.nd.status=e.target.value;});
  stDiv.appendChild(sel);grid.appendChild(stDiv);
  form.appendChild(grid);

  var addBtn=h("button",{class:"btn"},"+ Hinzufügen");
  addBtn.addEventListener("click",function(){
    if(!state.nd.acriss||!state.nd.plate){showToast("⚠️ ACRISS + Kennzeichen nötig");return;}
    state.drops.push(Object.assign({},state.nd,{id:Date.now()}));
    state.nd={time:"",plate:"",acriss:"",vehicle:"",lor:"",status:"0"};
    showToast("✅ Drop hinzugefügt");render();
  });
  form.appendChild(addBtn);
  wrap.appendChild(form);

  var hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
  hdr.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"700",color:"#888"}},"Drops ("+state.drops.length+")"));
  var clrBtn=h("button",{style:{background:"#2a1515",border:"1px solid #dc2626",color:"#f87171",borderRadius:"6px",padding:"4px 10px",fontSize:"11px",cursor:"pointer"}},"Alle löschen");
  clrBtn.addEventListener("click",function(){if(confirm("Alle Drops löschen?")){state.drops=[];render();}});
  hdr.appendChild(clrBtn);wrap.appendChild(hdr);

  state.drops.forEach(function(d){
    var s=STATUS[d.status]||STATUS["0"];var p=parseA(d.acriss);
    var card=h("div",{class:"card"});
    var row=h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
    row.appendChild(h("div",{style:{fontFamily:"monospace",fontSize:"13px",fontWeight:"700",color:O,minWidth:"48px"}},d.time||"–"));
    var info=h("div",{style:{flex:"1"}});
    info.appendChild(h("div",{style:{fontFamily:"monospace",fontSize:"15px",fontWeight:"700",color:"#818cf8"}},d.acriss));
    info.appendChild(h("div",{style:{fontSize:"12px",color:"#ccc"}},d.vehicle));
    info.appendChild(h("div",{style:{fontSize:"10px",color:"#666",fontFamily:"monospace"}},d.plate+" · LOR "+d.lor));
    row.appendChild(info);
    var right=h("div",{style:{textAlign:"right"}});
    var badge=h("div",{style:{background:s.bg,color:s.color,border:"1px solid "+s.color,borderRadius:"20px",padding:"2px 8px",fontSize:"10px",fontWeight:"700",marginBottom:"4px"}},s.icon+" "+s.label);
    right.appendChild(badge);
    var del=h("button",{class:"del"},"×");
    var did=d.id;
    del.addEventListener("click",function(){state.drops=state.drops.filter(function(x){return x.id!==did;});showToast("🗑 Gelöscht");render();});
    right.appendChild(del);row.appendChild(right);card.appendChild(row);
    if(p)card.appendChild(h("div",{style:{marginTop:"4px",fontSize:"10px",color:"#555"}},p.catLabel+" · "+p.bodyLabel+" · "+p.transLabel));
    wrap.appendChild(card);
  });
  return wrap;
}

function renderResis(){
  var wrap=document.createDocumentFragment();
  wrap.appendChild(renderScanButtons());
  var nr=state.nr;
  var form=h("div",{class:"card",style:{border:"1px solid #2a2a45"}});
  form.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"700",color:O,marginBottom:"10px"}},"+ Reservierung manuell"));
  var grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}});

  function inp(lbl,type,placeholder,val,onchange){
    var d=h("div",{});
    d.appendChild(h("div",{style:{fontSize:"10px",color:"#888",marginBottom:"4px",textTransform:"uppercase"}},lbl));
    var i=h("input",{class:"inp",type:type,placeholder:placeholder,value:val||""});
    i.addEventListener("input",onchange);d.appendChild(i);return d;
  }

  grid.appendChild(inp("Pickup Zeit","time","",nr.time,function(e){state.nr.time=e.target.value;}));
  grid.appendChild(inp("Resi-Nr.","text","9734xxxxxx",nr.resi,function(e){state.nr.resi=e.target.value;}));

  var acDiv=h("div",{});
  acDiv.appendChild(h("div",{style:{fontSize:"10px",color:"#888",marginBottom:"4px",textTransform:"uppercase"}},"ACRISS"));
  var acInp=h("input",{class:"inp",placeholder:"CDAR",maxlength:"4",value:nr.acriss||"",style:{textTransform:"uppercase",fontFamily:"monospace",letterSpacing:"2px",color:nr.acriss&&nr.acriss.length===4?"#4ade80":"#fff"}});
  acInp.addEventListener("input",function(e){state.nr.acriss=e.target.value.toUpperCase().slice(0,4);render();});
  acDiv.appendChild(acInp);
  if(nr.acriss&&nr.acriss.length===4){var p=parseA(nr.acriss);if(p)acDiv.appendChild(h("div",{style:{fontSize:"9px",color:"#4ade80",marginTop:"2px"}},p.catLabel+" · "+p.bodyLabel+" · "+p.transLabel));}
  grid.appendChild(acDiv);

  grid.appendChild(inp("Rückgabe","text","12.06.",nr.returnDate,function(e){state.nr.returnDate=e.target.value;}));
  var lorDiv=h("div",{style:{gridColumn:"span 2"}});
  lorDiv.appendChild(h("div",{style:{fontSize:"10px",color:"#888",marginBottom:"4px",textTransform:"uppercase"}},"LOR (Tage)"));
  var lorInp=h("input",{class:"inp",type:"number",placeholder:"4",value:nr.lor||""});
  lorInp.addEventListener("input",function(e){state.nr.lor=e.target.value;});
  lorDiv.appendChild(lorInp);grid.appendChild(lorDiv);
  form.appendChild(grid);

  var addBtn=h("button",{class:"btn"},"+ Hinzufügen");
  addBtn.addEventListener("click",function(){
    if(!state.nr.acriss||!state.nr.resi){showToast("⚠️ ACRISS + Resi-Nr. nötig");return;}
    state.resis.push(Object.assign({},state.nr,{id:Date.now()}));
    state.nr={time:"",resi:"",acriss:"",returnDate:"",lor:""};
    showToast("✅ Reservierung hinzugefügt");render();
  });
  form.appendChild(addBtn);wrap.appendChild(form);

  var hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
  hdr.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"700",color:"#888"}},"Reservierungen ("+state.resis.length+")"));
  var clrBtn=h("button",{style:{background:"#2a1515",border:"1px solid #dc2626",color:"#f87171",borderRadius:"6px",padding:"4px 10px",fontSize:"11px",cursor:"pointer"}},"Alle löschen");
  clrBtn.addEventListener("click",function(){if(confirm("Alle Resis löschen?")){state.resis=[];render();}});
  hdr.appendChild(clrBtn);wrap.appendChild(hdr);

  state.resis.forEach(function(r){
    var p=parseA(r.acriss);
    var card=h("div",{class:"card"});
    var row=h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
    row.appendChild(h("div",{style:{fontFamily:"monospace",fontSize:"13px",fontWeight:"700",color:O,minWidth:"48px"}},r.time||"–"));
    var info=h("div",{style:{flex:"1"}});
    info.appendChild(h("div",{style:{fontFamily:"monospace",fontSize:"15px",fontWeight:"700",color:"#818cf8"}},r.acriss));
    info.appendChild(h("div",{style:{fontSize:"11px",color:"#888",fontFamily:"monospace"}},r.resi));
    info.appendChild(h("div",{style:{fontSize:"10px",color:"#666"}},"bis "+(r.returnDate||"–")+" · LOR "+r.lor+"T"));
    row.appendChild(info);
    var del=h("button",{class:"del"},"×");
    var rid=r.id;
    del.addEventListener("click",function(){state.resis=state.resis.filter(function(x){return x.id!==rid;});showToast("🗑 Gelöscht");render();});
    row.appendChild(del);card.appendChild(row);
    if(p)card.appendChild(h("div",{style:{marginTop:"4px",fontSize:"10px",color:"#555"}},p.catLabel+" · "+p.bodyLabel+" · "+p.transLabel));
    wrap.appendChild(card);
  });
  return wrap;
}

function renderKey(){
  var wrap=document.createDocumentFragment();
  var info=h("div",{style:{background:"linear-gradient(135deg,#052e1688,#0f766e22)",border:"1px solid #4ade8044",borderRadius:"12px",padding:"14px",marginBottom:"16px",textAlign:"center"}});
  info.appendChild(h("div",{style:{fontSize:"20px",marginBottom:"6px"}},"🆓"));
  info.appendChild(h("div",{style:{fontSize:"14px",fontWeight:"700",color:"#4ade80",marginBottom:"4px"}},"Google Gemini – 100% Kostenlos"));
  info.appendChild(h("div",{style:{fontSize:"11px",color:"#86efac"}},"Kein Abo, keine Kreditkarte nötig"));
  wrap.appendChild(info);

  var form=h("div",{class:"card"});
  form.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"700",color:"#4ade80",marginBottom:"10px"}},"🔑 Google Gemini API Key"));
  var steps=h("div",{style:{background:"#0a1a0a",borderRadius:"8px",padding:"10px",marginBottom:"12px"}});
  ["1. aistudio.google.com öffnen","2. Mit Google Account einloggen","3. API-Schlüssel → API-Schlüssel erstellen","4. Key kopieren (beginnt mit AIza... oder AQ...)","5. Hier eintragen → Speichern"].forEach(function(s){
    steps.appendChild(h("div",{style:{fontSize:"11px",color:"#4ade80",padding:"2px 0"}},s));
  });
  form.appendChild(steps);

  var keyInp=h("input",{class:"inp",type:"password",placeholder:"AIzaSy... oder AQ...",value:state.apiKey||"",style:{fontFamily:"monospace",marginBottom:"10px"}});
  form.appendChild(keyInp);

  var saveBtn=h("button",{class:"btn"},"💾 Speichern");
  saveBtn.addEventListener("click",function(){
    var val=keyInp.value.trim();
    if(!val){showToast("⚠️ Key eingeben!");return;}
    state.apiKey=val;
    localStorage.setItem("sixt_gemini_key",val);
    showToast("✅ Key gespeichert!");render();
  });
  form.appendChild(saveBtn);

  if(state.apiKey){
    form.appendChild(h("div",{style:{marginTop:"10px",padding:"8px 12px",background:"#052e16",borderRadius:"8px",fontSize:"11px",color:"#4ade80"}},"✅ Key aktiv: "+state.apiKey.slice(0,14)+"..."));
  }
  wrap.appendChild(form);

  var reset=h("div",{class:"card"});
  reset.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"700",color:"#f87171",marginBottom:"8px"}},"🗑 Daten zurücksetzen"));
  var btns=h("div",{style:{display:"flex",gap:"8px"}});
  var b1=h("button",{style:{flex:"1",background:"#2a1515",border:"1px solid #dc2626",color:"#f87171",borderRadius:"8px",padding:"10px",cursor:"pointer"}},"Drops leeren");
  b1.addEventListener("click",function(){if(confirm("Alle Drops löschen?")){state.drops=[];showToast("🗑 Drops gelöscht");render();}});
  var b2=h("button",{style:{flex:"1",background:"#2a1515",border:"1px solid #dc2626",color:"#f87171",borderRadius:"8px",padding:"10px",cursor:"pointer"}},"Resis leeren");
  b2.addEventListener("click",function(){if(confirm("Alle Resis löschen?")){state.resis=[];showToast("🗑 Resis gelöscht");render();}});
  btns.appendChild(b1);btns.appendChild(b2);reset.appendChild(btns);wrap.appendChild(reset);
  return wrap;
}

function render(){
  var app=document.getElementById("app");
  app.innerHTML="";

  // Header
  var hdr=h("div",{style:{background:"linear-gradient(135deg,#FF6600,#cc4400)",padding:"14px 16px",display:"flex",alignItems:"center",gap:"12px",position:"sticky",top:"0",zIndex:"100",boxShadow:"0 2px 16px #FF660044"}});
  hdr.appendChild(h("div",{style:{fontSize:"24px"}},"🚗"));
  var title=h("div",{style:{flex:"1"}});
  title.appendChild(h("div",{style:{fontSize:"15px",fontWeight:"700"}},"Fleet Plan"));
  title.appendChild(h("div",{style:{fontSize:"10px",opacity:"0.8",fontFamily:"monospace"}},"Sixt Harburg · 46790"));
  hdr.appendChild(title);
  var tabs=h("div",{style:{display:"flex",gap:"3px",background:"rgba(0,0,0,0.2)",borderRadius:"8px",padding:"3px"}});
  [{k:"plan",i:"📋",l:"Plan"},{k:"drops",i:"📥",l:"Drops"},{k:"resis",i:"📅",l:"Resis"},{k:"key",i:"🔑",l:"Key"}].forEach(function(t){
    var btn=h("button",{style:{background:state.tab===t.k?"#fff":"transparent",color:state.tab===t.k?"#FF6600":"#fff",border:"none",borderRadius:"6px",padding:"5px 7px",fontSize:"10px",fontWeight:state.tab===t.k?"700":"400",cursor:"pointer"}},t.i+" "+t.l);
    (function(tk){btn.addEventListener("click",function(){state.tab=tk;render();});})(t.k);
    tabs.appendChild(btn);
  });
  hdr.appendChild(tabs);
  app.appendChild(hdr);

  // Toast
  if(state.toast){
    var toast=h("div",{style:{position:"fixed",top:"65px",left:"50%",transform:"translateX(-50%)",background:"#1a1a2e",border:"1px solid #FF6600",borderRadius:"10px",padding:"10px 18px",fontSize:"13px",fontWeight:"600",zIndex:"999",color:"#fff",boxShadow:"0 4px 20px #00000088",whiteSpace:"nowrap",maxWidth:"90vw",textAlign:"center"}},state.toast);
    app.appendChild(toast);
  }

  // Change Modal
  if(state.changeModal){
    var overlay=h("div",{style:{position:"fixed",top:"0",left:"0",right:"0",bottom:"0",background:"rgba(0,0,0,0.8)",zIndex:"200",overflowY:"auto",padding:"20px"}});
    var modal=h("div",{style:{background:"#1a1a2e",borderRadius:"16px",padding:"16px",border:"1px solid #FF660066",maxWidth:"500px",margin:"60px auto"}});
    modal.appendChild(h("div",{style:{fontSize:"14px",fontWeight:"700",color:"#FF6600",marginBottom:"12px"}},"✏️ Fahrzeug ändern für "+state.changeModal.resi.time+" · "+state.changeModal.resi.acriss));
    modal.appendChild(h("div",{style:{fontSize:"11px",color:"#888",marginBottom:"12px"}},"Wähle ein Fahrzeug aus den Drops:"));
    
    // Figure out which drops are already planned
    var currentMatches=autoMatch(state.drops,state.resis);
    var plannedDropIds={};
    currentMatches.forEach(function(m){
      if(m.d&&m.r.id!==state.changeModal.resiId){
        plannedDropIds[m.d.id]=m.r.time+" · "+m.r.acriss;
      }
    });

    // List all drops as options
    state.drops.forEach(function(d){
      var p=parseA(d.acriss);
      var isSelected=state.overrides[state.changeModal.resiId]===d.id;
      var isPlanned=plannedDropIds[d.id];
      var bg=isSelected?"#1a3a1a":isPlanned?"#1a1208":"#0d0d1a";
      var bdr=isSelected?"#16a34a":isPlanned?"#d97706":"#2a2a45";
      var row=h("div",{style:{background:bg,border:"1px solid "+bdr,borderRadius:"10px",padding:"12px",marginBottom:"8px",cursor:"pointer",opacity:isPlanned?"0.75":"1"}});
      var top2=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}});
      top2.appendChild(h("div",{style:{fontFamily:"monospace",fontSize:"14px",fontWeight:"700",color:isSelected?"#4ade80":isPlanned?"#fbbf24":"#818cf8"}},d.acriss));
      top2.appendChild(h("div",{style:{flex:"1",fontSize:"12px",color:"#ccc"}},d.vehicle));
      top2.appendChild(h("div",{style:{fontFamily:"monospace",fontSize:"10px",color:"#666"}},d.plate));
      if(isSelected)top2.appendChild(h("span",{style:{color:"#4ade80",fontSize:"11px",fontWeight:"700"}},"✅ Ausgewählt"));
      if(isPlanned)top2.appendChild(h("span",{style:{background:"#451a03",color:"#fbbf24",borderRadius:"20px",padding:"2px 8px",fontSize:"10px",fontWeight:"700"}},"⚠️ Verplant: "+isPlanned));
      row.appendChild(top2);
      if(p)row.appendChild(h("div",{style:{fontSize:"10px",color:"#555",marginTop:"4px"}},p.catLabel+" · "+p.bodyLabel+" · "+p.transLabel));
      (function(dropId){
        row.addEventListener("click",function(){
          state.overrides[state.changeModal.resiId]=dropId;
          state.changeModal=null;
          showToast(isPlanned?"⚠️ Achtung: Fahrzeug war bereits verplant!":"✅ Fahrzeug geändert!");
          render();
        });
      })(d.id);
      modal.appendChild(row);
    });
    
    // Remove override option
    if(state.overrides[state.changeModal.resiId]){
      var resetBtn=h("button",{style:{background:"#2a1515",border:"1px solid #dc2626",color:"#f87171",borderRadius:"8px",padding:"10px",width:"100%",marginTop:"8px",cursor:"pointer"}},"🔄 Automatische Zuteilung wiederherstellen");
      (function(rid){
        resetBtn.addEventListener("click",function(){
          delete state.overrides[rid];
          state.changeModal=null;
          showToast("🔄 Automatisch wiederhergestellt");
          render();
        });
      })(state.changeModal.resiId);
      modal.appendChild(resetBtn);
    }
    
    var closeBtn=h("button",{style:{background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:"8px",padding:"10px",width:"100%",marginTop:"8px",cursor:"pointer"}},"✕ Abbrechen");
    closeBtn.addEventListener("click",function(){state.changeModal=null;render();});
    modal.appendChild(closeBtn);
    overlay.appendChild(modal);
    app.appendChild(overlay);
  }

  // Content
  var content=h("div",{style:{padding:"14px",paddingBottom:"80px"}});
  if(state.tab==="plan")content.appendChild(renderPlan());
  else if(state.tab==="drops")content.appendChild(renderDrops());
  else if(state.tab==="resis")content.appendChild(renderResis());
  else content.appendChild(renderKey());
  app.appendChild(content);

  // Bottom nav
  var nav=h("div",{style:{position:"fixed",bottom:"0",left:"0",right:"0",background:"#0d0d1a",borderTop:"1px solid #1f1f35",display:"flex",zIndex:"100"}});
  [{k:"plan",i:"📋",l:"Plan"},{k:"drops",i:"📥",l:"Drops"},{k:"resis",i:"📅",l:"Resis"},{k:"key",i:"🔑",l:"Key"}].forEach(function(t){
    var btn=h("button",{style:{flex:"1",background:"none",border:"none",padding:"10px 0 8px",cursor:"pointer",color:state.tab===t.k?"#FF6600":"#555"}});
    btn.appendChild(h("div",{style:{fontSize:"18px"}},t.i));
    btn.appendChild(h("div",{style:{fontSize:"10px",fontWeight:state.tab===t.k?"700":"400"}},t.l));
    (function(tk){btn.addEventListener("click",function(){state.tab=tk;render();});})(t.k);
    nav.appendChild(btn);
  });
  app.appendChild(nav);
}

// CSS animation
var style=document.createElement("style");
style.textContent="@keyframes spin{to{transform:rotate(360deg)}}";
document.head.appendChild(style);

render();
</script>
</body>
</html>
