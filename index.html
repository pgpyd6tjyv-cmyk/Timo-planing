<!DOCTYPE html>
<html lang="de">

<meta name="apple-mobile-web-app-title" content="Fleet Plan"/>
<meta name="theme-color" content="#FF6600"/>
<title>Fleet Plan – Sixt Harburg</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d0d1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e8e8f0;font-size:14px}
input,select,button,label{font-family:inherit;font-size:14px}
input::placeholder{color:#444}
select option{background:#1a1a2e}
.inp{background:#1a1a2e;border:1px solid #2a2a45;border-radius:8px;color:#fff;padding:10px 12px;outline:none;width:100%}
.inp:focus{border-color:#FF6600}
.btn{background:#FF6600;color:#fff;border:none;border-radius:10px;padding:13px;width:100%;font-size:15px;font-weight:700;cursor:pointer}
.btn:active{opacity:.8}
.card{background:#131325;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #1f1f35}
.del{background:#2a1515;border:1px solid #dc2626;color:#f87171;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer}
.scan-label{display:flex;align-items:center;justify-content:center;gap:8px;border-radius:10px;padding:13px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;color:#fff;font-size:13px}
.scan-label input[type=file]{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:100px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";

/* ============ ACRISS ============ */
var CAT_ORDER=["M","E","H","C","D","I","J","S","R","F","G","P","U","L","W","X"];
var CATS={M:"Mini",E:"Economy",H:"Economy Elite",C:"Compact",D:"Compact Elite",I:"Intermediate",J:"Intermediate Elite",S:"Standard",R:"Standard Elite",F:"Fullsize",G:"Fullsize Elite",P:"Premium",U:"Premium Elite",L:"Luxury",W:"Luxury Elite",X:"Exklusiv"};
var BODIES={B:"2-türig",D:"4-türig",L:"Gran Coupé",W:"Kombi",F:"SUV",T:"Cabriolet",E:"Coupé",V:"Transporter",Z:"Glücksauto"};
var TRANS={M:"Schalt",A:"Automatik",D:"Allrad",L:"Luxus",S:"Spezial"};
var FAMILY={B:"PKW",D:"PKW",L:"PKW",W:"Kombi",F:"SUV",T:"Cabrio",E:"Coupé",V:"Transporter",Z:"Sonstige"};
var STATUS={
  "0":{label:"Verfügbar",color:"#16a34a",bg:"#dcfce7",icon:"✅"},
  "1":{label:"Vermietbereit",color:"#16a34a",bg:"#dcfce7",icon:"✅"},
  "2":{label:"Vermietbereit",color:"#16a34a",bg:"#dcfce7",icon:"✅"},
  "3":{label:"Nicht im Bestand",color:"#dc2626",bg:"#fee2e2",icon:"🔒"},
  "4":{label:"Verfügbar",color:"#16a34a",bg:"#dcfce7",icon:"✅"},
  "5":{label:"Kaputt",color:"#dc2626",bg:"#fee2e2",icon:"🔧"},
  "6":{label:"Kaputt",color:"#dc2626",bg:"#fee2e2",icon:"🔧"},
  "9":{label:"Verfügbar",color:"#16a34a",bg:"#dcfce7",icon:"✅"},
  "10":{label:"Aufbereitung",color:"#2563eb",bg:"#dbeafe",icon:"⏳"},
  "11":{label:"Aufbereitung",color:"#2563eb",bg:"#dbeafe",icon:"⏳"}
};
var ELEKTRO=["E","C","O"];
var PLANBAR_AVAIL=[1,2,4,9,10,11];   /* Status 3 = NICHT im Bestand! 5/6 kaputt */
var PLANBAR_DROP=[0,1,2,4,9,10,11];

function parseA(c){
  if(!c||c.length<4)return null;
  c=c.toUpperCase();
  return{raw:c,cat:c[0],body:c[1],trans:c[2],fuel:c[3],
    catLabel:CATS[c[0]]||c[0],bodyLabel:BODIES[c[1]]||c[1],transLabel:TRANS[c[2]]||c[2],
    family:FAMILY[c[1]]||"?",catIdx:CAT_ORDER.indexOf(c[0]),
    isAuto:c[2]==="A"||c[2]==="D",isElektro:ELEKTRO.indexOf(c[3])>=0};
}
function timeToMin(t){
  if(!t||t.indexOf(":")<0)return -1;
  var p=t.split(":");return parseInt(p[0],10)*60+parseInt(p[1],10);
}
/* "16.06." <-> "2026-06-16" */
function dateToISO(d){
  if(!d)return "";
  var m=d.match(/(\d{1,2})\.(\d{1,2})\.?/);
  if(!m)return "";
  var yr=new Date().getFullYear();
  return yr+"-"+("0"+m[2]).slice(-2)+"-"+("0"+m[1]).slice(-2);
}
function isoToDate(iso){
  if(!iso)return "";
  var p=iso.split("-");
  if(p.length<3)return "";
  return p[2]+"."+p[1]+".";
}

/* Sitzplaetze: 
   - body V (2. Stelle) = echter Van: LVxx/WVxx = 9-Sitzer, sonst 7-Sitzer
   - 4. Stelle V = SUV/PKW mit 7-Sitzer-Funktion (z.B. PFAV, IVAV) */
function seats(p){
  if(!p)return 0;
  if(p.body==="V"){                          /* echter Van */
    if(p.cat==="L"||p.cat==="W")return 9;     /* LVxx, WVxx = 9-Sitzer */
    return 7;
  }
  if(p.fuel==="V")return 7;                   /* xxxV = 7-Sitzer-Funktion (SUV mit 5+2) */
  return 5;                                    /* normaler PKW/SUV */
}

/* ============ MATCHING ============ */
function score(b,a){
  var bp=parseA(b),ap=parseA(a);
  if(!bp||!ap)return -999;
  if(bp.isAuto&&!ap.isAuto)return -999;                       /* Auto-Kunde NIE Manual */
  if(ap.catIdx<bp.catIdx)return -999;                          /* Kein Downgrade */
  if(!bp.isElektro&&ap.isElektro)return -999;                  /* Verbrenner → kein Elektro */
  if(ap.isElektro===false&&bp.isElektro)return -999;           /* Elektro-Kunde → nur Elektro */
  if(ap.body==="T"&&ap.catIdx>3&&bp.body!=="T")return -999;    /* Cabrio über C nur an Cabrio-Buchung */
  /* Sitzplatz-Regeln (auf Basis Sitzzahl, nicht Karosserie) */
  var bSeats=seats(bp),aSeats=seats(ap);
  if(bSeats>=7&&aSeats<bSeats)return -999;   /* 7/9-Sitzer-Buchung MUSS genug Sitze bekommen */
  var steps=ap.catIdx-bp.catIdx;
  var s=200;                                                    /* Basis: Kunde wird IMMER bedient */
  if(ap.raw===bp.raw)s+=100;
  if(ap.family===bp.family)s+=50;
  if(ap.cat===bp.cat)s+=30;
  if(!bp.isAuto&&!ap.isAuto)s+=70;                             /* Manual→Manual bevorzugt */
  if(!bp.isAuto&&ap.isAuto)s+=5;                               /* Manual→Auto Fallback */
  if(bp.isAuto&&ap.isAuto)s+=20;
  if(bSeats>=7&&aSeats===bSeats)s+=40;                        /* exakte Sitzzahl bevorzugt */
  s-=steps*8;                                                  /* nächstmögliches Upgrade */
  s-=(aSeats-bSeats)*3;                                        /* nicht unnötig viele Sitze verschenken */
  return s;
}

function getPool(){
  var avail=state.available.filter(function(a){
    return PLANBAR_AVAIL.indexOf(parseInt(a.status,10)||0)>=0;
  }).map(function(a){return{id:"av"+a.id,plate:a.plate,acriss:a.acriss,vehicle:a.vehicle,lor:a.lor||"",status:a.status,time:"",src:"avail"};});
  var drops=state.drops.filter(function(d){
    return PLANBAR_DROP.indexOf(parseInt(d.status,10)||0)>=0;
  }).map(function(d){return{id:"dr"+d.id,plate:d.plate,acriss:d.acriss,vehicle:d.vehicle,lor:d.lor||"",status:d.status,time:d.time||"",src:"drop"};});
  return avail.concat(drops);
}

function autoMatch(){
  var pool=getPool();
  var used={};
  Object.keys(state.overrides).forEach(function(rid){used[state.overrides[rid]]=true;});
  // Reservierungen nach Pickup-Uhrzeit sortieren (früheste zuerst)
  var sortedResis=state.resis.slice().sort(function(a,b){
    var ta=timeToMin(a.time),tb=timeToMin(b.time);
    if(ta<0)ta=9999; if(tb<0)tb=9999;
    return ta-tb;
  });
  return sortedResis.map(function(r){
    /* Manueller Override hat Vorrang */
    if(state.overrides[r.id]){
      var ov=pool.filter(function(p){return p.id===state.overrides[r.id];})[0];
      if(!ov){ /* override could refer to a non-planbar vehicle - look it up raw */
        var rawA=state.available.filter(function(a){return "av"+a.id===state.overrides[r.id];})[0];
        var rawD=state.drops.filter(function(d){return "dr"+d.id===state.overrides[r.id];})[0];
        if(rawA)ov={id:"av"+rawA.id,plate:rawA.plate,acriss:rawA.acriss,vehicle:rawA.vehicle,time:"",src:"avail"};
        if(rawD)ov={id:"dr"+rawD.id,plate:rawD.plate,acriss:rawD.acriss,vehicle:rawD.vehicle,time:rawD.time||"",src:"drop"};
      }
      if(ov){
        var t1=parseA(r.acriss),t2=parseA(ov.acriss);
        var typ=(t1&&t2&&t1.raw===t2.raw)?"exact":"upgrade";
        return{r:r,d:ov,type:typ,manual:true};
      }
    }
    /* 1. Versuch: Autos die zeitlich passen (Drop+1h ≤ Pickup) */
    function candidates(checkTime){
      return pool.filter(function(p){
        if(used[p.id])return false;
        if(checkTime&&p.time&&r.time){
          var ready=timeToMin(p.time)+60;
          var pick=timeToMin(r.time);
          if(ready>=0&&pick>=0&&ready>pick)return false;
        }
        return true;
      }).map(function(p){return{p:p,s:score(r.acriss,p.acriss)};})
        .filter(function(x){return x.s>-999;})
        .sort(function(a,b){return b.s-a.s;});
    }
    var cands=candidates(true);
    if(!cands.length)cands=candidates(false);  /* Auslastung: notfalls ohne Zeitcheck */
    if(!cands.length)return{r:r,d:null,type:"none"};
    used[cands[0].p.id]=true;
    var b=parseA(r.acriss),a=parseA(cands[0].p.acriss);
    var type=(b&&a&&b.raw===a.raw)?"exact":"upgrade";
    return{r:r,d:cands[0].p,type:type};
  });
}

function calcDaymin(){
  var av=state.available.filter(function(a){
    return PLANBAR_AVAIL.indexOf(parseInt(a.status,10)||0)>=0;
  }).length;
  var dr=state.drops.filter(function(d){
    var s=parseInt(d.status,10)||0;
    if(PLANBAR_DROP.indexOf(s)<0)return false;
    if(d.time&&d.time>state.cutoffTime)return false;   /* nach Cutoff → erst morgen */
    return true;
  }).length;
  return av+dr-state.resis.length;
}

/* ============ STATE ============ */
var DAYS=["mo","di","mi","do","fr"];
var DAY_LABELS={mo:"Mo",di:"Di",mi:"Mi",do:"Do",fr:"Fr"};

function emptyDay(){return{date:"",drops:[],resis:[],available:[],overrides:{}};}

var state={
  tab:"plan",
  day:"mo",
  days:{mo:emptyDay(),di:emptyDay(),mi:emptyDay(),do:emptyDay(),fr:emptyDay()},
  /* aktive Arbeits-Arrays = spiegeln den gewählten Tag */
  drops:[],
  resis:[],
  available:[],
  overrides:{},
  changeModal:null,
  apiKey:"",
  cutoffTime:"14:30",
  scanning:false,
  toast:"",
  nd:{time:"",plate:"",acriss:"",vehicle:"",lor:"",status:"0"},
  nr:{time:"",resi:"",acriss:"",returnDate:"",lor:"",name:""},
  na:{plate:"",acriss:"",vehicle:"",status:"1"}
};

/* Aktive Arrays in den Tag-Speicher zurückschreiben */
function syncActiveToDay(){
  var d=state.days[state.day];
  if(!d)return;
  d.drops=state.drops;
  d.resis=state.resis;
  d.available=state.available;
  d.overrides=state.overrides;
}
/* Tag wechseln: erst aktuellen Tag sichern, dann neuen laden */
function selectDay(dayKey){
  syncActiveToDay();
  state.day=dayKey;
  var d=state.days[dayKey];
  state.drops=d.drops;
  state.resis=d.resis;
  state.available=d.available;
  state.overrides=d.overrides;
  state.changeModal=null;
}

/* Rollover: Drops nach Cutoff von einem Tag → Available am Folgetag */
function applyRollover(){
  syncActiveToDay();
  for(var i=0;i<DAYS.length-1;i++){
    var today=state.days[DAYS[i]];
    var next=state.days[DAYS[i+1]];
    /* alte Rollover-Einträge des Folgetags entfernen (neu berechnen) */
    next.available=next.available.filter(function(a){return !a._rollover;});
    today.drops.forEach(function(d){
      var s=parseInt(d.status,10)||0;
      if(PLANBAR_DROP.indexOf(s)<0)return;        /* kaputt/Status3 nicht */
      if(d.time&&d.time>state.cutoffTime){         /* nach Cutoff → Folgetag */
        next.available.push({
          id:"ro"+d.id,plate:d.plate,acriss:d.acriss,vehicle:d.vehicle,
          status:"1",_rollover:true,_fromDay:DAYS[i]
        });
      }
    });
  }
  /* aktive Arrays neu laden falls aktueller Tag betroffen */
  var cur=state.days[state.day];
  state.available=cur.available;
}

function saveToStorage(){
  try{
    syncActiveToDay();
    applyRollover();
    localStorage.setItem("fleet_days",JSON.stringify(state.days));
    localStorage.setItem("fleet_day",state.day);
    localStorage.setItem("fleet_cutoff",state.cutoffTime);
  }catch(e){}
}
function loadFromStorage(){
  try{
    state.apiKey=localStorage.getItem("sixt_api_key")||"";
    var c=localStorage.getItem("fleet_cutoff");
    if(c)state.cutoffTime=c;
    var daysRaw=localStorage.getItem("fleet_days");
    var dayCur=localStorage.getItem("fleet_day");
    if(daysRaw){
      var parsed=JSON.parse(daysRaw);
      DAYS.forEach(function(k){ if(!parsed[k])parsed[k]=emptyDay(); });
      state.days=parsed;
      state.day=(dayCur&&state.days[dayCur])?dayCur:"mo";
    }else{
      /* Migration: alte Einzeltag-Daten in Montag übernehmen */
      var od=localStorage.getItem("fleet_drops");
      var or=localStorage.getItem("fleet_resis");
      var oo=localStorage.getItem("fleet_overrides");
      var oa=localStorage.getItem("fleet_available");
      if(od||or||oa){
        var mo=state.days.mo;
        if(od)mo.drops=JSON.parse(od);
        if(or)mo.resis=JSON.parse(or);
        if(oo)mo.overrides=JSON.parse(oo);
        if(oa)mo.available=JSON.parse(oa);
      }
      state.day="mo";
    }
    /* aktive Arrays aus gewähltem Tag laden */
    var d=state.days[state.day];
    state.drops=d.drops;state.resis=d.resis;state.available=d.available;state.overrides=d.overrides;
  }catch(e){}
}

var toastTimer=null;
function showToast(msg,dur){
  state.toast=msg;render();
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){state.toast="";render();},dur||2500);
}

/* ============ FOTO-SCAN (Anthropic) ============ */
function scanPhoto(file){
  if(!state.apiKey){showToast("⚠️ Erst API Key im Key-Tab eingeben!");return;}
  var hint=state.tab; // aktueller Tab als Hinweis
  state.scanning=true;render();
  showToast("📸 Foto wird gelesen...",8000);
  var reader=new FileReader();
  reader.onerror=function(){state.scanning=false;showToast("❌ Foto konnte nicht gelesen werden",4000);render();};
  reader.onload=function(){
    var base64=String(reader.result).split(",")[1];
    showToast("🤖 KI analysiert...",10000);
    var hintText="";
    if(hint==="resis")hintText='\nHINWEIS: Der Nutzer scannt im Reservierungs-Tab. Wenn unklar, ist es WAHRSCHEINLICH eine Reservierungsliste (type "resis").\n';
    else if(hint==="available")hintText='\nHINWEIS: Der Nutzer scannt im Available-Tab. Wenn unklar, ist es WAHRSCHEINLICH eine Available-Liste (type "available").\n';
    else if(hint==="drops")hintText='\nHINWEIS: Der Nutzer scannt im Drops-Tab. Wenn unklar, ist es WAHRSCHEINLICH eine Drops-Liste (type "drops").\n';
    var prompt='Analysiere diesen Sixt Lynx Fleet Monitor Screenshot. Bestimme ZUERST den Screen-Typ anhand der Spaltenüberschriften:\n'+
      '\n'+
      'REGEL ZUR ERKENNUNG (genau in dieser Reihenfolge prüfen):\n'+
      '1) Wenn es eine Spalte "Reservation" ODER "Name" (Kundenname) ODER "Booking time" ODER "Prepaid" ODER "Payment type" gibt → type ist IMMER "resis". Das ist eine Reservierungsliste.\n'+
      '2) Sonst wenn es eine Spalte "Rental Agreement" UND "Return date" gibt (Rückgaben) → type ist "drops".\n'+
      '3) Sonst wenn die Überschrift "Available" lautet und es KEINE Reservation-Nr und KEINEN Kundennamen gibt, nur "Internal number","Licence plate","Vehicle group","Vehicle status" → type ist "available".\n'+
      '\n'+
      'WICHTIG: Eine Reservierung hat IMMER eine Reservation-Nummer (z.B. 9734xxxxxx) und/oder einen Kundennamen. Available hat NIEMALS eine Reservation-Nr oder einen Namen. Verwechsle das nicht!\n'+
      '\n'+
      'Gib NUR JSON zurück, kein anderer Text:\n'+
      'DROPS: {"type":"drops","data":[{"time":"08:00","plate":"M-XX 1234","acriss":"CDAR","vehicle":"VW Golf","lor":"3","status":"0"}]}\n'+
      'RESERVATIONS: {"type":"resis","data":[{"time":"06:00","resi":"9734xxxxxx","acriss":"CDAR","returnDate":"10.06.","lor":"3","name":"Mustermann"}]}\n'+
      'AVAILABLE: {"type":"available","data":[{"plate":"M-XX 1234","acriss":"CDAR","vehicle":"VW Golf","status":"1"}]}\n'+
      '\n'+
      'time = Pickup date & time als HH:MM. acriss = Vehicle group (4 Zeichen). resi = Reservation-Nummer. name = Kundenname. returnDate = Return date kurz (z.B. 10.06.). lor = Duration in Tagen als Zahl. status als String.\n'+
      'Bei AVAILABLE: status = Vehicle status (1,2,3,4,9,10,11).'+hintText;
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":state.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:2000,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:base64}},
          {type:"text",text:prompt}
        ]}]
      })
    }).then(function(res){
      return res.json().then(function(data){return{ok:res.ok,status:res.status,data:data};});
    }).then(function(out){
      state.scanning=false;
      if(!out.ok)throw new Error((out.data.error&&out.data.error.message)||("API Fehler "+out.status));
      if(!out.data.content||!out.data.content[0])throw new Error("Keine KI Antwort");
      var text=out.data.content[0].text.replace(/```json|```/g,"").trim();
      var parsed=JSON.parse(text);
      if(parsed.type==="drops"&&parsed.data&&parsed.data.length){
        parsed.data.forEach(function(x){state.drops.push({id:Date.now()+Math.random(),time:x.time||"",plate:x.plate||"",acriss:(x.acriss||"").toUpperCase(),vehicle:x.vehicle||"",lor:x.lor||"",status:String(x.status!=null?x.status:"0")});});
        state.tab="drops";saveToStorage();
        showToast("✅ "+parsed.data.length+" Drops importiert!");
      }else if(parsed.type==="resis"&&parsed.data&&parsed.data.length){
        parsed.data.forEach(function(x){state.resis.push({id:Date.now()+Math.random(),time:x.time||"",resi:x.resi||"",acriss:(x.acriss||"").toUpperCase(),returnDate:x.returnDate||"",lor:x.lor||"",name:x.name||""});});
        state.tab="resis";saveToStorage();
        showToast("✅ "+parsed.data.length+" Reservierungen importiert!");
      }else if(parsed.type==="available"&&parsed.data&&parsed.data.length){
        parsed.data.forEach(function(x){state.available.push({id:Date.now()+Math.random(),plate:x.plate||"",acriss:(x.acriss||"").toUpperCase(),vehicle:x.vehicle||"",status:String(x.status!=null?x.status:"1")});});
        state.tab="available";saveToStorage();
        showToast("✅ "+parsed.data.length+" Available importiert!");
      }else{
        showToast("⚠️ Keine Daten erkannt – nochmal versuchen",4000);
      }
      render();
    }).catch(function(e){
      state.scanning=false;
      showToast("❌ Fehler: "+e.message,5000);
      render();
    });
  };
  reader.readAsDataURL(file);
}

/* ============ DOM HELPERS ============ */
function h(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==="style")Object.assign(el.style,attrs[k]);
    else if(k==="class")el.className=attrs[k];
    else el.setAttribute(k,attrs[k]);
  });
  if(children!=null){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c==null||c===false)return;
      if(typeof c==="string"||typeof c==="number")el.appendChild(document.createTextNode(String(c)));
      else el.appendChild(c);
    });
  }
  return el;
}

/* ============ SCAN BUTTONS ============ */
function renderScanButtons(){
  var wrap=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"14px"}});
  if(state.scanning){
    var sp=h("div",{style:{gridColumn:"span 2",background:"linear-gradient(135deg,#7c3aed,#4f46e5)",borderRadius:"10px",padding:"13px",display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",color:"#fff",fontWeight:"700"}});
    sp.appendChild(h("div",{class:"spinner"}));
    sp.appendChild(document.createTextNode("KI analysiert..."));
    wrap.appendChild(sp);
    return wrap;
  }
  function makeLabel(bg,icon,text,capture){
    var lbl=h("label",{class:"scan-label",style:{background:bg}});
    lbl.appendChild(h("span",{style:{fontSize:"18px"}},icon));
    lbl.appendChild(h("span",{},text));
    var inp=document.createElement("input");
    inp.type="file";inp.accept="image/*";
    if(capture)inp.setAttribute("capture","environment");
    inp.addEventListener("change",function(){

  grid.appendChild(field("Resi-Nr.",r2));

  var acw=h("div",{});
  var r3=h("input",{class:"inp",placeholder:"CDAR",maxlength:"4",value:nr.acriss||"",style:{textTransform:"uppercase",fontFamily:"monospace",letterSpacing:"2px"}});
  r3.addEventListener("input",function(e){state.nr.acriss=e.target.value.toUpperCase().slice(0,4);render();});
  acw.appendChild(r3);
  if(nr.acriss&&nr.acriss.length===4){var pr=parseA(nr.acriss);if(pr)acw.appendChild(h("div",{style:{fontSize:"9px",color:"#4ade80",marginTop:"2px"}},pr.catLabel+" · "+pr.bodyLabel+" · "+pr.transLabel));}
  grid.appendChild(field("ACRISS",acw));

  var r4=h("input",{class:"inp",placeholder:"12.06.",value:nr.returnDate||""});
  r4.addEventListener("input",function(e){state.nr.returnDate=e.target.value;});
  grid.appendChild(field("Rückgabe",r4));

  var r5=h("input",{class:"inp",type:"number",placeholder:"4",value:nr.lor||""});
  r5.addEventListener("input",function(e){state.nr.lor=e.target.value;});
  grid.appendChild(field("LOR (Tage)",r5));

  var r6=h("input",{class:"inp",placeholder:"Name",value:nr.name||""});
  r6.addEventListener("input",function(e){state.nr.name=e.target.value;});
  grid.appendChild(field("Kunde",r6));
  form.appendChild(grid);

  var addBtn=h("button",{class:"btn"},"+ Hinzufügen");
  addBtn.addEventListener("click",function(){
    if(!state.nr.acriss||!state.nr.resi){showToast("⚠️ ACRISS + Resi-Nr. nötig");return;}
    state.resis.push(Object.assign({},state.nr,{id:Date.now()}));
    state.nr={time:"",resi:"",acriss:"",returnDate:"",lor:"",name:""};
    saveToStorage();showToast("✅ Reservierung hinzugefügt");render();
  });
  form.appendChild(addBtn);wrap.appendChild(form);

  var hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
  hdr.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"700",color:"#888"}},"Reservierungen ("+state.resis.length+")"));
  var clr=h("button",{class:"del"},"Alle löschen");
  clr.addEventListener("click",function(){if(confirm("Alle Resis löschen?")){state.resis=[];state.overrides={};saveToStorage();render();}});
  hdr.appendChild(clr);wrap.appendChild(hdr);

  state.resis.forEach(function(r){
    var p=parseA(r.acriss);
    var card=h("div",{class:"card"});
    var row=h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
    row.appendChild(h("div",{style:{fontFamily:"monospace",fontSize:"13px",fontWeight:"700",color:"#FF6600",minWidth:"48px"}},r.time||"–"));
    var info=h("div",{style:{flex:"1"}});
    info.appendChild(h("div",{style:{fontFamily:"monospace",fontSize:"15px",fontWeight:"700",color:"#818cf8"}},r.acriss||""));
    if(r.name)info.appendChild(h("div",{style:{fontSize:"12px",color:"#ccc"}},r.name));
    info.appendChild(h("div",{style:{fontSize:"11px",color:"#888",fontFamily:"monospace"}},r.resi||""));
    info.appendChild(h("div",{style:{fontSize:"10px",color:"#666"}},"bis "+(r.returnDate||"–")+" · LOR "+(r.lor||"–")+"T"));
    row.appendChild(info);
    var del=h("button",{class:"del"},"×");
    (function(rid){del.addEventListener("click",function(){
      state.resis=state.resis.filter(function(x){return x.id!==rid;});
      delete state.overrides[rid];
      saveToStorage();showToast("🗑 Gelöscht");render();
    });})(r.id);
    row.appendChild(del);card.appendChild(row);
    if(p)card.appendChild(h("div",{style:{marginTop:"4px",fontSize:"10px",color:"#555"}},p.catLabel+" · "+p.bodyLabel+" · "+p.transLabel));
    wrap.appendChild(card);
  });
  return wrap;
}

/* ============ KEY TAB ============ */
function renderKey(){
  var wrap=document.createDocumentFragment();

  var info=h("div",{style:{background:"linear-gradient(135deg,#052e1688,#0f766e22)",border:"1px solid #4ade8044",borderRadius:"12px",padding:"14px",marginBottom:"16px",textAlign:"center"}});
  info.appendChild(h("div",{style:{fontSize:"20px",marginBottom:"6px"}},"🤖"));
  info.appendChild(h("div",{style:{fontSize:"14px",fontWeight:"700",color:"#4ade80",marginBottom:"4px"}},"Anthropic Claude API"));
  info.appendChild(h("div",{style:{fontSize:"11px",color:"#86efac"}},"Foto-Scan mit Claude KI"));
  wrap.appendChild(info);

  var form=h("div",{class:"card"});
  form.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"700",color:"#4ade80",marginBottom:"10px"}},"🔑 Anthropic API Key"));
  var steps=h("div",{style:{background:"#0a1a0a",borderRadius:"8px",padding:"10px",marginBottom:"12px"}});
  ["1. console.anthropic.com öffnen","2. Einloggen → API-Schlüssel","3. Schlüssel erstellen → kopieren","4. Key beginnt mit: sk-ant-api03-...","5. Hier eintragen → Speichern"].forEach(function(s){
    steps.appendChild(h("div",{style:{fontSize:"11px",color:"#4ade80",padding:"2px 0"}},s));
  });
  form.appendChild(steps);

  var keyInp=h("input",{class:"inp",type:"password",placeholder:"sk-ant-api03-...",value:state.apiKey||"",style:{fontFamily:"monospace",marginBottom:"10px"}});
  form.appendChild(keyInp);

  var saveBtn=h("button",{class:"btn"},"💾 Speichern");
  saveBtn.addEventListener("click",function(){
    var val=keyInp.value.trim();
    if(!val){showToast("⚠️ Key eingeben!");return;}
    if(val.indexOf("sk-ant-")!==0){showToast("⚠️ Key muss mit sk-ant- beginnen!");return;}
    state.apiKey=val;
    try{localStorage.setItem("sixt_api_key",val);}catch(e){}
    showToast("✅ Key gespeichert!");render();
  });
  form.appendChild(saveBtn);

  if(state.apiKey)form.appendChild(h("div",{style:{marginTop:"10px",padding:"8px 12px",background:"#052e16",borderRadius:"8px",fontSize:"11px",color:"#4ade80"}},"✅ Key aktiv: "+state.apiKey.slice(0,14)+"..."));
  wrap.appendChild(form);

  var reset=h("div",{class:"card"});
  reset.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"700",color:"#f87171",marginBottom:"8px"}},"🗑 Daten zurücksetzen"));
  reset.appendChild(h("div",{style:{fontSize:"10px",color:"#888",marginBottom:"8px"}},"Aktueller Tag: "+DAY_LABELS[state.day]));
  var btns=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}});
  [
    ["Drops (Tag)",function(){state.drops=[];}],
    ["Resis (Tag)",function(){state.resis=[];state.overrides={};}],
    ["Avail (Tag)",function(){state.available=[];}],
    ["Tag leeren",function(){state.drops=[];state.resis=[];state.available=[];state.overrides={};}]
  ].forEach(function(pair){
    var b=h("button",{style:{background:"#2a1515",border:"1px solid #dc2626",color:"#f87171",borderRadius:"8px",padding:"10px",cursor:"pointer",fontSize:"12px"}},pair[0]);
    b.addEventListener("click",function(){
      if(confirm(pair[0]+" – "+DAY_LABELS[state.day]+"?")){pair[1]();saveToStorage();showToast("🗑 Erledigt");render();}
    });
    btns.appendChild(b);
  });
  reset.appendChild(btns);
  var weekBtn=h("button",{style:{background:"#450a0a",border:"1px solid #dc2626",color:"#f87171",borderRadius:"8px",padding:"11px",cursor:"pointer",fontSize:"12px",fontWeight:"700",width:"100%",marginTop:"8px"}},"⚠️ GANZE WOCHE leeren (Mo–Fr)");
  weekBtn.addEventListener("click",function(){
    if(confirm("Wirklich die GANZE Woche Mo–Fr löschen?")){
      DAYS.forEach(function(k){state.days[k]=emptyDay();});
      var d=state.days[state.day];
      state.drops=d.drops;state.resis=d.resis;state.available=d.available;state.overrides=d.overrides;
      saveToStorage();showToast("🗑 Ganze Woche geleert");render();
    }
  });
  reset.appendChild(weekBtn);
  wrap.appendChild(reset);
  return wrap;
}

/* ============ CHANGE MODAL ============ */
function renderChangeModal(app){
  if(!state.changeModal)return;
  var overlay=h("div",{style:{position:"fixed",top:"0",left:"0",right:"0",bottom:"0",background:"rgba(0,0,0,0.85)",zIndex:"200",overflowY:"auto",padding:"16px"}});
  var modal=h("div",{style:{background:"#1a1a2e",borderRadius:"16px",padding:"16px",border:"1px solid #FF660066",maxWidth:"500px",margin:"40px auto"}});
  var cm=state.changeModal;
  modal.appendChild(h("div",{style:{fontSize:"14px",fontWeight:"700",color:"#FF6600",marginBottom:"4px"}},"✏️ Fahrzeug ändern"));
  modal.appendChild(h("div",{style:{fontSize:"11px",color:"#888",marginBottom:"12px"}},(cm.resi.time||"–")+" · "+(cm.resi.acriss||"")+(cm.resi.name?" · "+cm.resi.name:"")));

  /* Welche Autos sind bereits verplant? */
  var matches=autoMatch();
  var planned={};
  matches.forEach(function(m){
    if(m.d&&m.r.id!==cm.resiId)planned[m.d.id]=(m.r.time||"")+" · "+(m.r.acriss||"");
  });

  var pool=getPool();
  /* Auch nicht-planbare anzeigen (rot), damit man alles sieht */
  var blockedAvail=state.available.filter(function(a){
    return PLANBAR_AVAIL.indexOf(parseInt(a.status,10)||0)<0;
  }).map(function(a){return{id:"av"+a.id,plate:a.plate,acriss:a.acriss,vehicle:a.vehicle,time:"",src:"avail",blocked:true,status:a.status};});

  pool.concat(blockedAvail).forEach(function(d){
    var p=parseA(d.acriss);
    var isSel=state.overrides[cm.resiId]===d.id;
    var isPlanned=planned[d.id];
    var isBlocked=d.blocked;
    var bg=isSel?"#1a3a1a":(isBlocked?"#1a0a0a":(isPlanned?"#1a1208":"#0d0d1a"));
    var bdr=isSel?"#16a34a":(isBlocked?"#dc2626":(isPlanned?"#d97706":"#2a2a45"));
    var row=h("div",{style:{background:bg,border:"1px solid "+bdr,borderRadius:"10px",padding:"12px",marginBottom:"8px",cursor:isBlocked?"not-allowed":"pointer",opacity:isBlocked?"0.6":(isPlanned?"0.85":"1")}});
    var top=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}});
    top.appendChild(h("div",{style:{fontFamily:"monospace",fontSize:"14px",fontWeight:"700",color:isSel?"#4ade80":(isBlocked?"#f87171":(isPlanned?"#fbbf24":"#818cf8"))}},d.acriss||""));
    top.appendChild(h("div",{style:{flex:"1",fontSize:"12px",color:"#ccc"}},d.vehicle||""));
    top.appendChild(h("div",{style:{fontFamily:"monospace",fontSize:"10px",color:"#666"}},d.plate||""));
    if(d.time)top.appendChild(h("span",{style:{fontSize:"10px",color:"#FF6600",fontFamily:"monospace"}},"Drop "+d.time));
    if(isSel)top.appendChild(h("span",{style:{color:"#4ade80",fontSize:"11px",fontWeight:"700"}},"✅ Ausgewählt"));
    if(isPlanned)top.appendChild(h("span",{style:{background:"#451a03",color:"#fbbf24",borderRadius:"20px",padding:"2px 8px",fontSize:"10px",fontWeight:"700"}},"⚠️ Verplant: "+isPlanned));
    if(isBlocked)top.appendChild(h("span",{style:{background:"#450a0a",color:"#f87171",borderRadius:"20px",padding:"2px 8px",fontSize:"10px",fontWeight:"700"}},"🔒 Nicht im Bestand"));
    row.appendChild(top);
    if(p)row.appendChild(h("div",{style:{fontSize:"10px",color:"#555",marginTop:"4px"}},p.catLabel+" · "+p.bodyLabel+" · "+p.transLabel));
    if(!isBlocked){
      (function(vid,wasPlanned){
        row.addEventListener("click",function(){
          state.overrides[cm.resiId]=vid;
          state.changeModal=null;
          saveToStorage();
          showToast(wasPlanned?"⚠️ Achtung: Auto war bereits verplant!":"✅ Fahrzeug geändert!");
          render();
        });
      })(d.id,isPlanned);
    }
    modal.appendChild(row);
  });

  if(state.overrides[cm.resiId]){
    var rst=h("button",{style:{background:"#2a1515",border:"1px solid #dc2626",color:"#f87171",borderRadius:"8px",padding:"10px",width:"100%",marginTop:"8px",cursor:"pointer"}},"🔄 Automatische Zuteilung wiederherstellen");
    rst.addEventListener("click",function(){
      delete state.overrides[cm.resiId];
      state.changeModal=null;saveToStorage();
      showToast("🔄 Automatisch wiederhergestellt");render();
    });
    modal.appendChild(rst);
  }
  var cls=h("button",{style:{background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:"8px",padding:"10px",width:"100%",marginTop:"8px",cursor:"pointer"}},"✕ Abbrechen");
  cls.addEventListener("click",function(){state.changeModal=null;render();});
  modal.appendChild(cls);
  overlay.appendChild(modal);
  app.appendChild(overlay);
}

/* ============ MAIN RENDER ============ */
var TABS=[{k:"plan",i:"📋",l:"Plan"},{k:"available",i:"🅿️",l:"Avail"},{k:"drops",i:"📥",l:"Drops"},{k:"resis",i:"📅",l:"Resis"},{k:"key",i:"🔑",l:"Key"}];

function render(){
  var app=document.getElementById("app");
  app.innerHTML="";

  /* Header */
  var hdr=h("div",{style:{background:"linear-gradient(135deg,#FF6600,#cc4400)",padding:"12px 14px",display:"flex",alignItems:"center",gap:"10px",position:"sticky",top:"0",zIndex:"100",boxShadow:"0 2px 16px #FF660044"}});
  hdr.appendChild(h("div",{style:{fontSize:"22px"}},"🚗"));
  var title=h("div",{style:{flex:"1",minWidth:"0"}});
  title.appendChild(h("div",{style:{fontSize:"14px",fontWeight:"700"}},"Fleet Plan"));
  title.appendChild(h("div",{style:{fontSize:"9px",opacity:"0.8",fontFamily:"monospace"}},"Sixt Harburg · 46790"));
  hdr.appendChild(title);
  var tabs=h("div",{style:{display:"flex",gap:"2px",background:"rgba(0,0,0,0.2)",borderRadius:"8px",padding:"3px"}});
  TABS.forEach(function(t){
    var btn=h("button",{style:{background:state.tab===t.k?"#fff":"transparent",color:state.tab===t.k?"#FF6600":"#fff",border:"none",borderRadius:"6px",padding:"5px 5px",fontSize:"9px",fontWeight:state.tab===t.k?"700":"400",cursor:"pointer",whiteSpace:"nowrap"}},t.i+" "+t.l);
    (function(tk){btn.addEventListener("click",function(){state.tab=tk;render();});})(t.k);
    tabs.appendChild(btn);
  });
  hdr.appendChild(tabs);
  app.appendChild(hdr);

  /* Tag-Auswahl Mo-Fr */
  var dayBar=h("div",{style:{display:"flex",gap:"4px",background:"#0d0d1a",padding:"8px 10px",position:"sticky",top:"52px",zIndex:"99",borderBottom:"1px solid #1f1f35"}});
  DAYS.forEach(function(dk){
    var dd=state.days[dk];
    var active=state.day===dk;
    var hasData=dd&&(dd.drops.length||dd.resis.length||dd.available.length);
    var btn=h("button",{style:{flex:"1",background:active?"#FF6600":"#1a1a2e",color:active?"#fff":"#888",border:"1px solid "+(active?"#FF6600":"#2a2a45"),borderRadius:"8px",padding:"7px 2px",cursor:"pointer",textAlign:"center"}});
    btn.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"700"}},DAY_LABELS[dk]));
    btn.appendChild(h("div",{style:{fontSize:"8px",opacity:"0.8",fontFamily:"monospace",marginTop:"1px"}},(dd&&dd.date)?dd.date:"—"));
    if(hasData)btn.appendChild(h("div",{style:{fontSize:"7px",color:active?"#fff":"#4ade80",marginTop:"1px"}},"●"));
    (function(k){btn.addEventListener("click",function(){selectDay(k);render();});})(dk);
    dayBar.appendChild(btn);
  });
  app.appendChild(dayBar);

  /* Toast */
  if(state.toast){
    app.appendChild(h("div",{style:{position:"fixed",top:"60px",left:"50%",transform:"translateX(-50%)",background:"#1a1a2e",border:"1px solid #FF6600",borderRadius:"10px",padding:"10px 18px",fontSize:"13px",fontWeight:"600",zIndex:"999",color:"#fff",boxShadow:"0 4px 20px #00000088",maxWidth:"92vw",textAlign:"center"}},state.toast));
  }

  /* Change Modal */
  renderChangeModal(app);

  /* Content */
  var content=h("div",{style:{padding:"14px",paddingBottom:"80px"}});
  if(state.tab==="plan")content.appendChild(renderPlan());
  else if(state.tab==="available")content.appendChild(renderAvailable());
  else if(state.tab==="drops")content.appendChild(renderDrops());
  else if(state.tab==="resis")content.appendChild(renderResis());
  else content.appendChild(renderKey());
  app.appendChild(content);

  /* Bottom Nav */
  var nav=h("div",{style:{position:"fixed",bottom:"0",left:"0",right:"0",background:"#0d0d1a",borderTop:"1px solid #1f1f35",display:"flex",zIndex:"100"}});
  TABS.forEach(function(t){
    var btn=h("button",{style:{flex:"1",background:"none",border:"none",padding:"9px 0 7px",cursor:"pointer",color:state.tab===t.k?"#FF6600":"#555"}});
    btn.appendChild(h("div",{style:{fontSize:"17px"}},t.i));
    btn.appendChild(h("div",{style:{fontSize:"9px",fontWeight:state.tab===t.k?"700":"400"}},t.l));
    (function(tk){btn.addEventListener("click",function(){state.tab=tk;render();});})(t.k);
    nav.appendChild(btn);
  });
  app.appendChild(nav);
}

loadFromStorage();
render();
</script>
</body>
</html>
